<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- jquery 기본(필수) 명령어
         .text()       : text 읽기
         .text("값")   : text 쓰기
         .html()       : html 읽기/쓰기
         ("#in").html("<div>안녕</div>")   : html 안에 in을 들고와주세요
         .val()        : 요소에 값을 읽기/쓰기(input, select 등)
         .attr()       : 속성(src, href 등) 읽기/쓰기
         .prop()       : dom 속성(checked, disabled 등) 읽고 쓰기
         .removeAttr(), removeProp() : 속성 제거
         
         **클래스 제어
         .css()    : 읽기/ 쓰기
         .addClass : class 추가
         .removeClass : class 삭제 
         .toggleClass : class 추가 삭제 둘 다 가능
         .dis.classLisr.togglr("on")
         .hasClass : 특정 클래스 포함 여부 확인(if문)

         **요소 다루기(div, ul,,,)
         .append() : 요소 뒤에 추가
         .prepend() : 요소 앞에 추가
         .remove() : 요소 제거 
         .empty() : 요소의 내부 내용을 모두 제거
         .clone() : 요소를 복제

         **이벤트
         .click(), .change(), .hover(), .keyup(), .triggar() : 이벤트를 강제 실행
         .dblclick(): 더블클릭할 때, 이벤트를 강제 실행
         
         ** 애니메이션
         .show(), .hode() : 표시, 숨김
         .fdeIn(), .fadeOut() : 서서히 나타났다 서서히 사라짐
         .slideDown() / slideUp() :
         .animate() : css 애니메이션 조절할 수 있게끔

         -->
</body>
</html>
