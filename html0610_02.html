        button{

            height: 50px;
            padding: 5px;
            border-radius: 10px;
            background-color: #ccc;
            color: white;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            cursor: pointer;
        }
        .prev{
            left: 20px;
        }
        .next{

    <script>
        $(function(){
            const slider=$(".slider")
            let sw=$(".slide").outerWidth()
            let sl=$(".slide").length
            let index=1
            let slideInterval;

            slider.append($(".slide").eq(0).clone())
            slider.prepend($(".slide").eq(sl-1).clone())

            function moveSlide(){
                slider.stop(true,true).animate({
                    marginLeft:-sw*index
                },500, function(){
                    if(index>sl+1){
                        index=1
                        slider.css("marginLeft", -sw*index)
                    }
                    if(index === 0){
                        index=sl
                        slider.css("marginLeft",-sw*index)
                    }

                })

            }

            function autoPlay(){
                slideInterval=setInterval(function(){
                    index++
                    moveSlide()
                },6000)
            }


            //button
            $(".next").on("click", function(){
                clearInterval(slideInterval)
                index++
                moveSlide()
                autoPlay()
            })

            $(".prev").on("click", function(){
                clearInterval(slideInterval)
                index--
                moveSlide()
                autoPlay()
            })
            autoPlay()
        })
    </script>
