<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            /* gap: 20px; */
            background-color: rgb(230,230,230);
            width: 400px;
            height: 200px;
            margin: 100px auto;
            border-radius: 7px;
            border: 2px solid rgb(225,225,225);
            box-shadow: 2px 2px 4px rgba(92, 89, 89, 0.5);
            
        }
        .box2{
            width: 300px;
            height: 40px;
            font-size: 25px;
            font-weight: bold;
            text-align: center;
            /* margin-top: 30px; */
        }
        .box3{
            width: 90px;
            height: 30px;
            background-color: orangered;
            border-radius: 5px;
            border: 1px solid rgb(182, 48, 0);
            font-size: 18px;
            font-weight: bold;
            /* margin-top: -40px; */
            color: white;
            text-align: center;
            line-height: 30px;
        }
        
    </style>
</head>
<body>
    <div class="box1">
        <div class="box2"> IMPORTANT MESSAGE!</div><br>
        <div class="box3">Close</div>
    </div>
</body>
</html>
