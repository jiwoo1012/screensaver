<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스위스 국기</title>
    <style>
        *{margin: 0; padding: 0;}

        .outBox{
            width: 400px;
            height: 400px;
            background-color: rgb(255,0,0);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
        }
        .inBox1{
            width: 50px;
            height: 200px;
            background-color: rgb(255, 255, 255);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
        }
        .inBox2{
            width: 200px;
            height: 50px;
            background-color: rgb(255, 255, 255);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
        }
    </style>
</head>
<body>
    <div class="outBox">
        <div class="inBox1"></div>
        <div class="inBox2"></div>
    </div>
</body>
</html>
