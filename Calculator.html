<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-image: linear-gradient(rgba(224, 224, 224, 0.4), rgba(255,255,255,0.4)), url('./img/bg5.png');
            background-size: cover, cover;
            background-repeat: no-repeat, no-repeat;
        }
        h2{
            font-size: 50px;
            text-shadow: 0 0 8px #f3c7d0, 0 0 20px #f3c7d0aa;
        }
        .wrap{
            width: 500px;
            margin: 30px auto;
            background-color: #333;
            padding: 40px;
            border-radius: 20px;
        }
        .show{
            width: 100%;
            /* height: 100px; */
            background-color: #fff;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
            box-shadow: #f3c7d0 3px 3px 6px 0px inset, rgba(255, 255, 255, 0.5) -3px -3px 6px 1px inset;
        }
        .tlr{
            width: 100%;
            height: 20px;
            font-size: 20px;
            color: #666;
            text-align: right;
            padding: 23px;
            overflow: hidden;
        }
        .screen{
            width: 100%;
            font-size: 40px;
            font-weight: bold;
            text-align: right;
            padding-right: 10px;
        }
        .btnBox{
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 40px;
        }
        .btnBox button{
            height: 70px;
            background-color: #F4D0D8;
            border-radius: 40px;
            font-size: 30px;
            font-weight: bold;
            color: #333;
            box-shadow: #c4909b 3px 3px 6px 0px inset, rgba(255, 227, 227, 0.5) -3px -3px 6px 1px inset;
        }
        .btnBox button:hover{
            background-color: #f5aebd;
        }
    </style>
</head>
<body>
    <h2>CALCULATOR</h2>
    <div class="wrap">
        <div class="show">
            <div class="tlr"></div>
            <div class="screen">0</div>
        </div>

        <div class="btnBox">
            <button onclick="clearN()">C</button>
            <button onclick="setOp('/')">÷</button>
            <button onclick="setOp('*')">x</button>
            <button onclick="backSpace()">&#8592;</button>

            <button onclick="pushNum('7')">7</button>
            <button onclick="pushNum('8')">8</button>
            <button onclick="pushNum('9')">9</button>
            <button onclick="setOp('+')">+</button>

            <button onclick="pushNum('4')">4</button>
            <button onclick="pushNum('5')">5</button>
            <button onclick="pushNum('6')">6</button>
            <button onclick="setOp('-')">-</button>

            <button onclick="pushNum('1')">1</button>
            <button onclick="pushNum('2')">2</button>
            <button onclick="pushNum('3')">3</button>
            <button onclick="calc('=')">=</button>

            <button class="lastBtn" style="grid-column: span 2;" onclick="pushNum('0')">0</button>
            <button onclick="pushNum('00')">00</button>
            <button onclick="pushDot()">.</button>
        </div>

        <p></p>
    </div>
    <script>
        class Calculator{
            constructor(num1,num2){
                this.num1=num1
                this.num2=num2
            }
            plus(){
                return this.num1+this.num2
            }
            minus(){
                return this.num1-this.num2
            }
            multi(){
                return this.num1*this.num2
            }
            divide(){
                return this.num1/this.num2
            }
        }

        let current=""
        let firstNum=''
        let operator=""

        function backSpace(){
            current=current.slice(0,-1)
            updateScreen()
        }
        function clearN(){
            document.querySelector(".screen").innerHTML="0"
            document.querySelector(".tlr").innerHTML= "" 
            current=""
            firstNum=""
            operator=""

        }
        function updateScreen(){
            let screen=document.querySelector(".screen")
            if(current===""){
                screen.innerHTML="0"
                return
            }
            screen.innerHTML=Number(current).toLocaleString()
        }
        function pushNum(num){
            current+=num
            updateScreen()
        }

        function setOp(op){
            if(current===''){
                return
            }
            firstNum=Number(current)
            operator=op
            current=''
            document.querySelector(".tlr").innerHTML+= firstNum.toLocaleString()+ " " +op
        }
        function calc(){
            if(current==="") return
            let secondNum=Number(current)

            let item=new Calculator(firstNum, secondNum)
            
            let result=0
            document.querySelector(".tlr").innerHTML += " " + secondNum.toLocaleString()
            switch(operator){
                case "+":
                    result=item.plus()
                    break
                case "-":
                    result=item.minus()
                    break
                case "*":
                    result=item.multi()
                    break
                case "/":
                    result=item.divide()
                    break
            }
            document.querySelector(".screen").innerHTML=result.toLocaleString()
        }
    </script>
</body>
</html>
