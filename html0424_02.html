<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0; padding: 0;}
        #one{
            display: flex;
            align-items: center;
            width: 100%;
            height: 50px;
            background-color: #cf2b2b;
        }
        .logo{
            width: 20%;
            height: 50px;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo1{
            width: 100px;
            object-fit: cover;
        }
        .nav{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80%;
            height: 50px;
            background-color: #333;
            gap: 50px;
            color: white;
            font-size: 10px;
        }
        #two{
            width: 100%;
            height: 200px;
            background-image: url('./img/img7.JPG');
            object-fit: cover;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .smart{
            color: orangered;
            position: absolute;
            top: 50px;
            position: absolute;
        }
        h1{
            position: absolute;
            color: white;
        }
        h2{
            margin: 40px auto;
        }
        .box{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            width: 700px;
            height: 30px;
            background-color: #d4d4d4;
            font-size: 14px;
            position: absolute;
            bottom: 0;
            color: white;
        }
        #three{
            position: relative;
        }
        h2{
            position: absolute;
            left: 140px;
        }
        table{
            margin: 10px auto;
            border: 1px solid black;
            border-collapse: collapse;
            text-align: center;
            width: 1000px;
            height: 100px;
            position: absolute;
            top: 200px;
            left: 140px;
        }
        th,tr,td{
            border: 1px solid orange;
            padding: 10px;
        }
        th{
            color: rgb(255, 255, 255);
            background-color: orange;
        }
        tr,td{
            padding: 30px;
        }
    </style>
</head>
<body>
    <div id="one">
        <div class="logo">
            <img class="logo1" src="./img/img6.png" alt="logo" />
        </div>
        <div class="nav">
            <h3>STK</h3>
            <h3>전시회 구성</h3>
            <h3>참가 업체</h3>
            <h3>참관객</h3>
            <h3>프로그램</h3>
            <h3>미디어센터</h3>
        </div>
    </div>
    <div id="two">
        <p class="smart">스마트테크 코리아</p>
        <h1>참가 안내</h1>
        <div class="box">
            <span>참가 안내</span>
            <span>온라인 부스 참가 신청 안내</span>
            <span>스폰서쉽 프로그램</span>
            <span>홍보 자료</span>
        </div>
    </div>
    <div id="three">
        <h2>참가 신청 절차</h2>
        <table>
        <tr>
            <th>STEP 1</th>
            <th>STEP 2</th>
            <th>STEP 3</th>
            <th>STEP 4</th>
            <th>STEP 5</th>
        </tr>
        <tr>
            <td>기업 회원 가입/로그인</td>
            <td>온라인 참가 신청</td>
            <td>참가 신청서 작성 및 제출<br>(tech@smarttechkorea.com)</td>
            <td>계약금 20% 납입<br>접수 1주일 이내</td>
            <td>잔금 납입<br>(-2026.04.24)</td>
        </tr>
    </table>
    </div>
</body>
</html>
