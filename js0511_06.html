<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 자동 실행문(시간마다 자동 실행)
     setInterval(function(){
        밀리 초마다 반복 실행하는 문(반복실행문)
     },밀리 초)
     
     setInterval(함수 명, 밀리초)
     단, 함수 명은 괄호를 사용하지 않는다!
     -->
    <div id="dis"></div>

     <script>
        function clock(){
        let dis=document.querySelector("#dis")
        let k=''
        let today=new Date()
        let hh=today.getHours()
        let mm=today.getMinutes()
        let ss=today.getSeconds()
        let dd=today.getDay()
        let year=today.getFullYear()
        let mon=today.getMonth()
        let day=today.getDate()

            if(hh>=12){
                k="오후"
                hh= hh-12
                if(hh==12){
                    hh=12
                }
            }else{
                k="오전"
            }

            if(hh<10){
                hh="0"+hh
            }
            if(mm<10){
                mm="0"+mm
            }
            if(ss<10){
                ss="0"+ss
            }

            switch(dd){
                case 0:
                    dd="일"
                    break
                case 1:
                    dd="월"
                    break
                case 2:
                    dd="화"
                    break
                case 3:
                    dd="수"
                    break
                case 4:
                    dd="목"
                    break
                case 5:
                    dd="금"
                    break
                case 6:
                    dd="토"
                    break
            }

        dis.innerHTML=`${year}년 ${mon+1}월 ${day}일 ${dd}요일 <br> ${k} ${hh} : ${mm} : ${ss} `
        }
        setInterval(clock,1000)
     </script>
</body>
</html>
