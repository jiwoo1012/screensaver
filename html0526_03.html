<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        .wrap{
            width: min(1200px, 90%); /*최대 1200px을 넘지 않음*/
            margin: 30px auto;
        }
        .grid{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
            gap: 20px;
        }
        .card{
            
            /* height: clamp(200px, 20vw, 400px);  height는 clamp를 잘 사용하지 않음 */
            height: 400px;
            border: 1px solid #333;
            border-radius: 10px;
            overflow: hidden;
            padding: 20px;
            transition: all 0.5s;
        }
        .card:hover{
            transform: translateY(-10px);
        }

        .card img{
            width: 100%;
            height: 70%;
            object-fit: cover;
            border-radius: 10px;
        }
        .card h3{
            font-size: clamp(20px, 2vw, 30px);
        }
        .card p{
            font-size: clamp(14px, 1vw, 20px);
            margin-bottom: 7px;
        }
        .card button{
            width: 100%;
            background-color: #333;
            color: white;
            border-radius: 10px;
            padding: 8px;
            font-size: clamp(14px, 1vw, 18px);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="grid">
            <div class="card">
                <img src="./img/keyboard.png" alt="키보드">
                <h3>키보드</h3>
                <p>30,000원</p>
                <button>구매하기</button>
            </div>
             <div class="card">
                <img src="./img/mouse.png" alt="마우스">
                <h3>마우스</h3>
                <p>28,000원</p>
                <button>구매하기</button>
            </div>
             <div class="card">
                <img src="./img/headset.png" alt="헤드셋">
                <h3>헤드셋</h3>
                <p>300,000원</p>
                <button>구매하기</button>
            </div>
        </div>
    </div>
</body>
</html>
