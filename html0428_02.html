<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0; padding: 0;}
        html{
            scroll-behavior: smooth ;
        }
        ul{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            list-style: none;
            position: fixed;
            width: 100%;
            height: 50px;
            background-color: blue;
            z-index: 10; /*1보다 크면 됨*/
        }
        a{
            text-decoration: none; /*링크(?)의 밑줄 없애는 거*/
            color: black;
        }
        section{
            /* position: relative; */
            scroll-margin-top: 50px;
            width: 100%;
            height: 700px;
            background: linear-gradient(135deg, skyblue, rgb(234, 249, 255));
        }
        #box2{
            background: pink;
        }
    </style>
</head>
<body> 
    <ul>
        <li><a href="#box1">menu1</a></li>
        <li><a href="#box2">menu2</a></li>
        <li><a href="#box3">menu3</a></li>
    </ul>
    <section id="box1">나는 첫 번째 섹션이다.</section>
    <section id="box2">나는 두 번째 섹션이다.</section>
    <section id="box3">나는 세 번째 섹션이다.</section>
</body>
</html>
