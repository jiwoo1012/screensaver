<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        header{
            width: 100%;
        }
        #nav{
            display: flex;
            justify-content: center;
            width: 100%;
            height: 70px;
            background-color: rgb(255, 208, 247);
            transition: all 0.3s;
        }
        #nav.on{
            height: 470px;
        }
        #nav >div{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 25%;
            font-size: 35px;
            font-weight: bold;
        }
        .gnb{
            display: flex;
            justify-content: space-around;
            width: 75%;
            height: 70px;
        }
        .gnb > li{
            width: calc(100%/5);
            height: 70px;
            line-height: 70px;

        }
        .gnb > li> a{
            width: 100%;
            height: 100%;
            display: block; 
        }
        .sub{
            display: none;
        }
        .sub>li{
            margin-top: -10px;
        }
    </style>
</head>
<body>
    <header>
        <div id="nav">
            <div><a href="#">logo</a></div>
            <ul class="gnb">
                <li>
                    <a href="#">1번 메뉴</a>
                    <ul class="sub">
                        <li><a href="#">메뉴1</a></li>
                        <li><a href="#">메뉴2</a></li>
                        <li><a href="#">메뉴3</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#">2번 메뉴</a>
                    <ul class="sub">
                        <li><a href="#">메뉴1</a></li>
                        <li><a href="#">메뉴2</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#">3번 메뉴</a>
                    <ul class="sub">
                        <li><a href="#">메뉴1</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#">4번 메뉴</a>
                    <ul class="sub">
                        <li><a href="#">메뉴1</a></li>
                        <li><a href="#">메뉴2</a></li>
                        <li><a href="#">메뉴3</a></li>
                        <li><a href="#">메뉴4</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#">5번 메뉴</a>
                    <ul class="sub">
                        <li><a href="#">메뉴1</a></li>
                        <li><a href="#">메뉴2</a></li>
                        <li><a href="#">메뉴3</a></li>
                        <li><a href="#">메뉴4</a></li>
                        <li><a href="#">메뉴5</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </header>
<!-- ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ이제부터 자바스크립트 ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ -->
    <script>
        let nav=document.querySelector('#nav')
        let gnb=document.querySelector('.gnb')
        let sub=document.querySelectorAll('.sub')

        gnb.addEventListener("mouseover", function(){
            nav.classList.add("on");
            setTimeout(function(){
                for(let i=0;i<sub.length;i++){
                    sub[i].style.display="block"
                }
                },300)
        })

        gnb.addEventListener("mouseout", function(){
            nav.classList.remove("on");
            setTimeout(function(){
                for(let i=0;i<sub.length;i++){
                    sub[i].style.display="none"
                }
                },300)
        })
    </script>
</body>
</html>
