<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배열을 매개변수로 입력받아 총합의 값을 돌려 받아서 출력하기</title>
</head>
<body>
    <script>
      let num=[3,7,2,1,5]
      
      function sum(arrNum){
        let addSum = 0
        for(let i=0;i<arrNum.length;i++){
            sum+=addSum[i]
        }
        return addSum
      }
      sum(num)
    //   console.log(sum(num))
    </script>
</body>
</html>
