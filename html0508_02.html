<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        header{
            width: 100%;
        }
        #nav{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 70px;
            background-color: pink;
        }
        #nav.on{
            height: 470px;
        }
        #nav>div{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 25%;
            font-size: 35px;
        }
        #nav>.gnb{
            display: flex;
            justify-content: space-around;
            width: 75%;
            height: 70px;
        }
        #nav>.gnb>li{
            width: calc(100%/5);
            height: 70px;
            line-height: 70px;
        }
        #nav>.gnb>li>a{
            width: 100%;
            height: 100%;
            display: block;
        }
        .sbn{
            display: none;
        }
        .sbn>li{
            margin-top: -20px;
        }
    </style>
</head>
<body>
    <header>
        <div id="nav">
            <div><a href="#">logo</a></div>
            <ul class="gnb">
                <li>
                    <a href="#">1번 메뉴</a>
                    <ul class="sbn">
                        <li><a href="#">메뉴1</a></li>
                        <li><a href="#">메뉴2</a></li>
                        <li><a href="#">메뉴3</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#">2번 메뉴</a>
                    <ul class="sbn">
                        <li><a href="#">메뉴1</a></li>
                        <li><a href="#">메뉴2</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#">3번 메뉴</a>
                    <ul class="sbn">
                        <li><a href="#">메뉴1</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#">4번 메뉴</a>
                    <ul class="sbn">
                        <li><a href="#">메뉴1</a></li>
                        <li><a href="#">메뉴2</a></li>
                        <li><a href="#">메뉴3</a></li>
                        <li><a href="#">메뉴4</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#">5번 메뉴</a>
                    <ul class="sbn">
                        <li><a href="#">메뉴1</a></li>
                        <li><a href="#">메뉴2</a></li>
                        <li><a href="#">메뉴3</a></li>
                        <li><a href="#">메뉴4</a></li>
                        <li><a href="#">메뉴5</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </header>
    <!-- ------------------이제부터 자바스크립트-------------------- -->
    <script>
        let nav=document.querySelector('#nav')
        let gnb=document.querySelector('.gnb')
        let sbn=document.querySelectorAll('.sbn')

        gnb.addEventListener("mouseover", function(){
            nav.classList.add("on")
            setTimeout(function(){
                for(let i=0;i<sbn.length;i++){
                    sbn[i].style.display="block"
                }
            },300)
        })
        gnb.addEventListener("mouseout", function(){
            nav.classList.remove("on")
            setTimeout(function(){
                for(let i=0;i<sbn.length;i++){
                    sbn[i].style.display="none"
                }
            },300)
        })
    </script>
</body>
</html>
