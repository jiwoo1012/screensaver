<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임의의 배열을 만들고(단, length는 5), 배열의 총 합계 구하기</title>
</head>
<body>
    <script>
        let arr=[1,5,8,2]
        function arrSum(a){
            let sum=0
            for(let i=0;i<arr.length;i++){
                sum+=a[i]
            }return sum
        }
        function array(){
            let sum=arrSum(arr)
            document.querySelector("#dis").innerHTML=`세 수의 결과 값은: ${sum}`
        }
    </script>
</body>
</html>
