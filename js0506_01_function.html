<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    </style>
</head>
<body>
    <button onclick="myFun(1)">1번</button> 
    <button onclick="myFun(2)">2번</button> 
    <button onclick="myFun(3)">3번</button>
    <button onclick="myFun(4)">4번</button>
    <button onclick="myFun(5)">5번</button>
    <button onclick="myFun(6)">6번</button>
    <div id="dis"></div>
    <script>
        let dis=document.querySelector("#dis")

        function myFun(num){
            if(num%2==0){
                dis.innerHTML+=`클릭한 숫자는 ${num}입니다. 짝수입니다.<br>`
            }else{
                dis.innerHTML+=`클릭한 숫자는 ${num}입니다. 홀수입니다.<br>`
            }
        }
    </script>
</body>
</html>
