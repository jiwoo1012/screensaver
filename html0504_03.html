<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .smallBox{
            width: 50%;
            height: 200px;
        }
        .simg{
            width: 80%;
            height: 200px;
            object-fit: cover;
        }
        .modalBox{
            display: none;
            justify-content: center;
            align-items: center;
            background-color: rgba(0,0,0,0.7);
            width: 100%;
            height: 100vh;
            position: absolute;
            left: 0; top: 0;
        }
        .modalBox.on{
            display: flex;
        }
        .bigImgBox{
            width: 50%;
            height: 200px;
            background-color: white;
            position: relative;
        }
        #btn{
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            right: 10px; top: 10px;
        }
    </style>
</head>
<body>
    <div class="smallBox">
        <img class="simg" src="./img/pororo.JPG" alt="뽀로로 사진">
    </div>
    <div class="modalBox">
        <div class="bigImgBox">
            <button id="btn">닫기</button>
            <img src="./img/pororo.JPG" alt="">
        </div>
    </div>
</body>
</html>
