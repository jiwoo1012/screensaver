<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap{
            width: 900px;
            height: 400px;
            background-image: linear-gradient(90deg, #d8cf9d, #dbc33c);
        }
        .wrap img:nth-child(1){  /*wrap 대장 안에 내가 첫 번째 자식이에요! , 이름을 쓰기 싫을 때 nth-child(1)를 사용함.*/
            position: absolute;
            left: 50px;
            top: 30px;
            width: 400px;
            height: 300px;
            object-fit: cover;
            z-index: 1;
        }
        .wrap img:nth-child(2){  
            position: absolute;
            border-radius: 50%;
            right: 1300px;
            top: 30px;
            width: 300px;
            height: 300px;
            object-fit: cover;

            animation: rotate 10s infinite linear;
        }
        @keyframes rotate{
            0%{
                transform: rotate(0deg);
            }
            100%{
                transform: rotate(360deg);
            }
        }

    </style>
</head>
<body>
    <div class="wrap">
        <img src="./img/chu2.jpg" alt="">
        <img src="./img/chu2.jpg" alt="">
    </div>
</body>
</html>
