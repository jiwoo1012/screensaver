<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과제02</title>
    <style>
        p{
            color: blue;
            font-size: 150px;
        }
        .pibu{
            color: black;
            font-weight: bold;
        }
        .box1{
            background-color: gold;
            width: 800px;
            height: 100px;
            border: 0.5px solid orange;
            border-radius: 100px;
            box-shadow: 10px 20px 50px black;
            /* 오른쪽 크기, 아래 크기, 번지기, 그림자 색상*/
            box-shadow: rgb(38, 57, 77) 0px 20px 30px -10px;
            text-align: center;
            line-height: 100px;
            
        }
    </style>
</head>
<body>
    <p>
        <span class="pibu"> 피부에도 </span>
        안심
    </p>
    <div class="box1">나는 박스</div>
</body>
</html>
