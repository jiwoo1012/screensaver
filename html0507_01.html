<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        .wrap{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 10px;
            width: 60%;
            height: 80vh;
            margin: 20px auto;
        }
        .bigBox{
            width: 70%;
            height: 50%;
            border: 1px solid #999;
            border-radius: 7px;
        }
        .bigBox img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 7px;
        }
        .smallBox{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 70%;
            height: 30%;
        }
        .smallImg{
            width: 20%;
            height: 70%;
            overflow: hidden; /*부모보다 크면 잘라버려라. 안 보이게 해.*/
            box-shadow: 1px 1px 4px rgba(0,0,0,0.7);
            border-radius: 5px;
        }
        .smallImg img{
            width: 100%;
            height: 100%;
            object-fit: cover; /*사진을 넣을 때 이걸 꼭 넣어줘야 사진이 예쁘게 나옴!!*/
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="bigBox">
            <img id="bigImg" src="./img/goyun.JPG" alt="goyunjung">
        </div>
        <div class="smallBox">
            <div class="smallImg">
            <img src="./img/goyun.JPG" alt="goyunjung">
            </div>
            <div class="smallImg">
            <img src="./img/carina1.JPG" alt="carina1">
            </div>
            <div class="smallImg">
            <img src="./img/carina.JPG" alt="carina">
            </div>
        </div>
    </div>
<!-- ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ이제부터 자바스크립트ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ -->
    <script>
        let bigImg=document.querySelector('#bigImg')
        let smallImgs=document.querySelectorAll('.smallImg Img') //img를 각각 들고 오라는 뜻

        smallImgs.forEach(function(item){
            item.addEventListener("mouseenter", ()=>{
                bigImg.src=item.src
            })
        })
        smallImgs.forEach(function(item){
            item.addEventListener("click", ()=>{
                bigImg.src=item.src
            })
        })
    </script>
</body>
</html>
