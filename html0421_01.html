<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0; padding: 0;}

        .outBox{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 300px;
            height: 200px;
            background-color: red;
            border-radius: 10px;
            position: absolute;
            left: 30%;
            top: 30%;
            transform: translate(-50%,-50%);  /*width를 기준으로 (왼쪽, 오른쪽)*/

        }
        .inBox1{
            width: 50%;
            height: 20px;
            background-color: white;
            position: absolute;
            left: 0;
            top: 70%;
            transform: translateY(-50%);
        }
        .inBox2{
            width: 20px;
            height: 200px;
            background-color: white;
            position: absolute;
            left: 70%;
            top: 0;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div class="outBox">
        <div class="inBox1"></div>
        <div class="inBox2"></div>
    </div>
</body>
</html>
