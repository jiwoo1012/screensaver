<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        label{
            display: block;
        }
    </style>
</head>
<body>
    <!--카페 음료 주문
        5개의 음료 중에 하나를 선택하면
        음료 이름, 음료 사이즈, 음료 원가, 음료 추가 금액 (음료 사이즈가 라디오)
        총 금액
        
        조건: 
            스몰은 천 원 추가
            미디움은 2천 원 추가
            라지는 4천 원 추가

            클래스 이용
        -->
        <div class="wrap">
            <h2>음료 선택</h2>
            <label>
                <input type="radio" name="drink" value="아이스 아메리카노">
                아이스 아메리카노
            </label>
            <label>
                <input type="radio" name="drink" value="카페 라테">
                카페 라테
            </label>
            <label>
                <input type="radio" name="drink" value="카푸치노">
                카푸치노
            </label>
            <label>
                <input type="radio" name="drink" value="복숭아 아이스티">
                복숭아 아이스티
            </label>
            <label>
                <input type="radio" name="drink" value="아이스크림">
                아이스크림
            </label>
            <br>
            <br>
            <h2>음료 사이즈 선택</h2>
            <label>
                <input type="radio" name="size" value="small">
                small(+1000원)
            </label>
            <label>
                <input type="radio" name="size" value="midium">
                midium(+2000원)
            </label>
            <label>
                <input type="radio" name="size" value="large">
                large(+4000원)
            </label>
            <br>
            <button onclick="ok()">선택하기</button>
        </div>
        <div id="dis"></div>
        <div id="total"></div>

        <script>
            class Cafe{
                constructor(menu,size){
                    this.menu=menu
                    this.size=size
                    this.price=3000
                }
                smallSize(){
                    return this.price+1000
                }
                midiumSize(){
                    return this.price+2000
                }
                largeSize(){
                    return this.price+4000
                }
            }

            let drinkCart=[]
            function ok(){
                let drink=document.querySelector("input[name='drink']:checked")
                let size=document.querySelector("input[name='size']:checked")
                let dis=document.querySelector("#dis")
                let total=document.querySelector("#total")

                if(!drink||!size){
                    dis.innerHTML=`원하시는 음료와 사이즈를 "둘 다" 체크해주세요.`
                    return
                }

                let item=new Cafe(drink.value, size.value)
                let totalPrice=0
                switch(item.size){
                    case "small":
                        totalPrice=item.smallSize()
                        break
                    case "midium":
                        totalPrice=item.midiumSize()
                        break
                    case "large":
                        totalPrice=item.largeSize()
                        break
                }
                drinkCart.push({
                    menu: item.menu, 
                    size:item.size, 
                    price: totalPrice
                    })

                let html=''
                let sum=0

                drinkCart.forEach(function(coffee){
                    html+=`<br><div>음료: ${coffee.menu} <br> 사이즈: ${coffee.size}<br> 가격: ${coffee.price}</div>`
                    sum+=coffee.price
                })

                dis.innerHTML=html
                total.innerHTML=`ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ<br>총 합계: ${sum.toLocaleString()}`
            }
        </script>
</body>
</html>
