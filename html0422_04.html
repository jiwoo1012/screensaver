<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0; padding: 0;}
        .outBox{
            width: 300px;
            height: 210px;
            border: 1px solid black;
            position: relative;
            border-radius: 3px;
        }
        .img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .inBox{
            width: 80px;
            height: 40px;
            background-color: #dadada;
            border-radius: 3px;
            border: 1px solid #aaaaaa;
            text-align: center;
            line-height: 40px;
            position: absolute;
            top: 0;
            right: 0;
        }
        .other{
            width: 300px;
            height: 210px;
            background-color: aliceblue;
            text-align: center;
            position: relative;
            padding: 1px;
        }
        .text1{
            color: rgb(168, 195, 219);
            font-size: 20px;
            border: 2px solid rgb(168, 195, 219);
            width: 130px;
            height: 40px;
            text-align: center;
            line-height: 40px;
            margin: 20px auto; 
        }
        h2{
            color: rgb(168, 195, 219);

        }
        .text2{
            color: rgb(168, 195, 219);
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="outBox">
        <img class="img" src="./img/img4.JPG"/>
        <div class="inBox">종료</div>
    </div>
    <div class="other">
        <p class="text1"> 명절 기획전</p>
        <h2>가치있는 소비로<br>만드는 행복한 한가위</h2>
        <p class="text2">참여하기 ></p>
    </div>
</body>
</html>
