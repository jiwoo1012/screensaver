<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <style>
        .wrap{
            width: 800px;
            margin: 50px auto;
        }
        .menu{
            display: flex;
        }
        .menu button{
            flex: 1;
            height: 50px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 5px 10px;
        }
        .menu button:hover{
            background-color: #ccc;
        }
        .menu button.on{
            background-color: #ccc;
        }
        .contents{
            display: none;
            padding: 20px;
            border: 1px solid #ddd;
            font-size: 25px;
            border-radius: 0 0 10px 10px;
        }
        .contents.on{
            display: block;
        }
    </style>
</head>
<body>
    <div class="wrap">
    
        <div class="menu">
            <button class="on">Notice</button>
            <button>Gallery</button>
            <button>QnA</button>
        </div>

        <div class="contents on">
            공지사항 내용입니다.
        </div>
        <div class="contents">
            갤러리 내용입니다.
        </div>
        <div class="contents">
            QnA 내용입니다.
        </div>
    </div>

    <script>
        //$(".menu button").click(function(){})
        $(".menu button").on("click", function(){
            let idx=$(this).index()
            $(".menu button").removeClass("on")
            $(this).addClass("on")

            $(".contents").removeClass("on")
            $(".contents").eq(idx).addClass("on")
        })
    </script>
</body>
</html>
