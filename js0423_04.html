<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문제1_ 1개의 수를 입력 받아 예시와 같이 반복해서 *이 출력 되도록 프로그램 구현</title>
</head>
<body>
    <script>
        let num=Number(prompt("숫자를 입력하세요."))
        for(let i=1;i<=num;i++){
            for(let j=1;j<=i;j++){
                document.write("*")
            }
            document.write("<br>")

            for(let k=1;k<=num-i;k++){
                document.write(`-`)
            }
        }
    </script>
</body>
</html>
