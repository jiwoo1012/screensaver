<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <style>
        header{
            width: 100%;
            height: 70px;
            position: fixed;
            left: 0; top: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
            font-size: 30px;
            font-weight: bold;

            transition: all 0.4s;
            background-color: transparent;
        }
        header.on{
            height: 60px;
            background-color: rgba(255,255,255,0.5);
            backdrop-filter: blur(20px);
        }
        section{
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
            font-size: 70px;
           display: flex;
           justify-content: center;
           align-items: center;
        }
        .sec1{background-color: skyblue;}
        .sec2{background-color: orange;}
        .sec3{background-color: pink;}
        .topBtn{
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #333;
            color: white;
            position: fixed;
            right: 50px; bottom: 70px;
            text-align: center;
            line-height: 50px;

            display: none;
        }
        .topBtn.on{
            display: block;
        }
</style>
</head>
<body>
    <header>logo & navi</header>
    <section class="sec1">첫 번째 화면입니다.</section>
    <section class="sec2">두 번째 화면입니다.</section>
    <section class="sec3">세 번째 화면입니다.</section>
    <div class="topBtn">Top</div>

    <script>
        $(window).on("scroll", function(){
            let scrTop=$(window).scrollTop()

            if(scrTop>80){
                $("header").addClass("on")
                $(".topBtn").fadeIn("on")  //서서히 보이게 해주는 명령어
            }else{
                $("header").removeClass("on")
                $(".topBtn").fadeOut("on")
            }
            $(".topBtn").on("click", function(){
                $("html, body").stop().animate({
                    scrollTop:0
                },0,5)
            })
        })
    </script>
</body>
</html>
