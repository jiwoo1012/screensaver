<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과일을 선택하면 선택한 과일의 가격이 출력되도록 출력하기t</title>
    <style>
        h2{
            color: darkblue;
            font-size: 30px;
            text-align: center;
        }
        .box{
            width: 300px;
            margin: 0 auto;
            background-color: rgb(227, 247, 255);
            border: 1px solid skyblue ;
            border-radius: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>상품 목록</h2>
    <select id="sel">
        <option value="사과">아삭한 사과</option>
        <option value="복숭아">향긋한 복숭아</option>
        <option value="딸기">상큼한 딸기</option>
        <option value="파인애플">달달한 파인애플</option>
    </select>
    <button id="btn">확인</button>
    <div class="box"></div>

    <script>
        let sang=[
            {name:"사과", price:2000},
            {name:"복숭아", price:1000},
            {name:"딸기", price:500},
            {name:"파인애플", price:3000}
        ]

        let box=document.querySelector(".box") /*여러 번 쓸 때는 class, 한 번만 쓸 때는 id 사용*/
        let sel=document.querySelector("#sel")
        let btn=document.querySelector("#btn")

        btn.onclick=function(){ /*클릭을 할 때, onclick 말고 다른 명령어도 있음. onclick은 기능이 제약이 많아서 아주 단순한 버튼을 만들 때 사용한다.*/
            box.innerHTML=''
            sang.forEach(function(item,idx){ /*function을 열고 닫으면 ()안의 일을 해!라는 뜻. 할 일을 지시할 때 function을 사용.*/
                if(sel.value===item.name){
                    box.innerHTML=`${idx+1}번째 과일, ${item.name}의 가격은 ${item.price}원이얌!`
                }
            })
        }
        
    </script>
</body>
</html>
