<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 40px;

            background-color: rgb(198, 228, 138);
            width: 500px;
            height: 350px;
            border: 2px solid rgb(183, 228, 95);
            border-radius: 2px;
            margin: 100px auto;
        }
        .box1{
            font-size: 30px;
            font-weight: bold;
            color: white;
            text-align: center;
            
            
        }
        .box2{
            font-size: 40px;
            font-weight: bold;
            color: white;
            background-color: yellowgreen;
            width: 300px;
            height: 65px;
            text-align: center;
            border-radius: 2px;
            line-height: 65px;

        }
    </style>

</head>
<body>
    <div class="main">
        <div class="box1">AI시대를 살아가는 공부 비법</div>
        <div class="box2">이젠아카데미</div>
    </div>
</body>
</html>
