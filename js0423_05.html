<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2개의 수를 입력 받아 예시와 같이 반복해서 *이 출력 되도록 프로그램 구현</title>
</head>
<body>
    <script>
        let num1=Number(prompt("첫 번째 수를 입력하세요."))
        let num2=Number(prompt("두 번째 수를 입력하세요."))

        for(let i=1;i<=num2;i++){
            for(let j=1;j<=num1;j++){
                document.write(`*`)
            }
            document.write("<br>")
        }
    </script>
</body>
</html>
