<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사과, 딸기, 바나나, 복숭아, 파인애플 원하는만큼 박스를 만드는데, 박스 안에 item(과일 이름) 들어가도록 생성하기</title>
    <style>

    </style>
</head>
<body>
    <div class="outBox">
        <input id="fruit" type="number" placeholder="원하는만큼 박스 생성하기"/>
        <button onclick="make()">박스 생성하기</button>
    </div>
    <div id="smallBox"></div>
    <script>
        let smallBox=document.querySelector('#smallBox')
        let item=["사과", "딸기","바나나","복숭아","파인애플"]
        smallBox.innerHTML=''
        function make(){
            let fruit=Number(document.querySelector("#fruit").value)
            for(let i=0;i<fruit;i++){
            let div=document.createElement("div")
            div.classList.add("box")
            div.innerText=item[i%item.length]
            smallBox.appendChild(div)
            }
        }
    </script>
</body>
</html>
