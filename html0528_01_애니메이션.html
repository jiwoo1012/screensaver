<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        div{
            width: 100px;
            height: 100px;
            background-color: blue;

            position: absolute;

            animation-name: move;  /*무슨 애니메이션을 진행할 거냐*/
            animation-duration: 2s; /*몇 초 동안 진행할 거냐*/
            /*animation-iteration-count: infinite;*/ /*몇 번 반복할 거냐,         infinite:무한 반복*/
            /*animation: move 2s infinite;*/ /*이렇게 이름, 진행 속도, 반복을 한꺼번에 적을 수 있음, 보통 이렇게 많이 사용함. 이름 속도 반복 순서 지켜서 작성하기 아니면 오류*/
            animation-timing-function: linear; /*ease: 시작하고 천천히 끝나게 하는 거*//*linear: 균일하게 시작과 끝*/
            animation-fill-mode: backwards; /*forwards: 애니메이션이 끝나고 마지막에 위치, backwards: 애니메이션이 끝나고 처음 위치로 돌아감*/
        }
        @keyframes move{
            0%{
                left: 0;
                opacity: 1;
                background-color: blue;
            }
            100%{
                left: 500px;
                top: 500px;
                opacity: 0;
                background-color: rgb(157, 255, 0);
            }
        }
    </style>
</head>
<body>
    <div></div>
    <script>

    </script>
</body>
</html>
