<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outBox{
            display: flex;
            justify-content: space-around;
            align-items: center;
            /* gap: 50px; */
            width: 600px;
            height: 150px;
            background-color: skyblue;
            border-radius: 10px;
            border: 1px solid rgb(99, 163, 189);
            box-shadow: 1px 1px 9px rgba(62, 106, 124, 0.7);
        }
        .inBox{
            width: 100px;
            height: 100px;
            background-color: darkblue;
        }
    </style>
</head>
<body>
    <div class="outBox">
        <div class="inBox"></div>
        <div class="inBox"></div>
        <div class="inBox"></div>
    </div>
</body>
</html>
