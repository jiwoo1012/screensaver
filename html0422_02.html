<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0; padding: 0;}
        .top{
            width: 100%;
            height: 300px;
            border: 1px solid black;
            border-radius: 4px;
            position: relative;
        }
        .img{
            width: 100%;
            height: 300px;
            border-radius: 4px;
            position: absolute;
            left: 0;
            top: 0;
        }
        p{
            color: rgb(255, 255, 255);
            font-size: 15px;
            position: absolute;
            left: 100px;
            top: 75px;
        }
        h2{
            font-size: 30px;  
            color: rgb(255, 255, 255);
            position: absolute;
            left: 100px;
            top: 110px;
        }
    </style>
</head>
<body>
    <div class="top">
        <img class="img" src="./img/img1.JPG" />
            <div class="text">
                <p>웃는 땅콩 알파리움 어린이집은</p>
                <h2>NC에서<br>직영으로 운영하는<br>직장 어린이집이다.</h2>
            </div>
    </div>
</body>
</html>
