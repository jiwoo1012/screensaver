<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아랍에미리트 국기</title>
    <style>
        *{margin: 0; padding: 0;}

        .outBox{
            width: 600px;
            height: 300px;
            background-color: rgb(255,0,0);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .inBox1{
            width: 450px;
            height: 100px;
            background-color: rgb(0,115,47);
            position: absolute;
            right: 0;
        }
        .inBox2{
            width: 450px;
            height: 100px;
            background-color: rgb(255, 255, 255);
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);

        }
        .inBox3{
            width: 450px;
            height: 100px;
            background-color: rgb(0,0,0);
            position: absolute;
            right: 0;
            bottom: 0;
            

        }
    </style>
</head>
<body>
    <div class="outBox">
        <div class="inBox1"></div>
        <div class="inBox2"></div>
        <div class="inBox3"></div>
    </div>
</body>
</html>
