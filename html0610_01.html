<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <style>
        .wrap{
            width: 800px;
            height: 400px;
            margin: 50px auto;
            overflow: hidden;
            position: relative;
        }
        .slider{
            display: flex;
            height: 10%;
            
        }
        .slide{
            width: 800px;
            height: 400px;
            flex-shrink: 0;/*크기가 변하지 않아요*/
        }

        .slide img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        button{
            width: 40px;
            height: 40px;
            padding: 5px;
            border-radius: 10px;
            background-color: rgba(255,255,255,0.5);

            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            cursor: pointer;
        }
        .prev{
            left: 20px;
        }
        .next{
            right: 20px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="slider">
            <div class="slide">
                <img src="./img/pororo.JPG" alt="pororo"/>
            </div>
            <div class="slide">
                <img src="./img/crong.JPG" alt="crong"/>
            </div>
            <div class="slide">
                <img src="./img/roofpy.JPG" alt="roofpy"/>
            </div>
        </div>

        <button class="prev">이전</button>
        <button class="next">다음</button>
    </div>
    
    <script>
        $(function(){
            const slider=$(".slider")
            let swidth=800 //slide width
            let scount=$(".slide").length //slide length
            let index=1
            let slideInterval; /*잠깐 멈추는 역할(자연스럽게 이미지 전환을 위해)*/

            //제일 마지막에 첫 번째 슬라이드 복제하는 역할
            slider.append($(".slide").eq(0).clone()) //append(): 마지막을 복제하라는 뜻 //ep(): 몇 번째인지 알려줌
            
            //제일 마지막 슬라이드를 제일 처음에 복제
            slider.prepend($(".slide").eq(scount-1).clone())

            function moveSlide(){
                slider.stop(true,true).animate({
                    marginLeft:-swidth*index
                },500)

                //애니메이션 끝나길 기다렸다가 슬라이드 변경하는 역할(애니메이션 없이! 바꿔치기)
                setTimeout(function(){

                    //마지막 슬라이드 체크할 때, 진짜 첫 번째 슬라이드로 변경 
                    if(index>=scount+1){
                        index=1 //첫 번째 사진으로 바꿔치기 하깅
                        slider.css(
                            "marginLeft",-swidth*index
                        )
                    }

                    //첫 번째 슬라이드인지 체크하고 진짜 마지막 슬라이드로 변경
                    if(index>=0){
                        index=scount
                        slider.css(
                            "marginLeft",-swidth*index
                        )
                    }
                },500) //딜레이를 시킴, animate 시간에 맞춰서 동시에 일어나게 설정하기!
            }

            function autoPlay(){
                slideInterval=setInterval(function(){
                    index++
                    moveSlide()
                },3000)
            }
            $(".next").on("click", function(){
                clearInterval(slideInterval)
                index++
                moveSlide()
                autoPlay()
            })
             $(".prev").on("click", function(){
                clearInterval(slideInterval)
                index--
                moveSlide()
                autoPlay()
            })
            autoPlay()
        })
    </script>
</body>
</html>
