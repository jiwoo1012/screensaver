<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{ margin: 0; padding: 0;}

        .outBox{
            width: 600px;
            height: 300px;
            background-color: rgb(0,106,167);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .inBox1{
            width: 60px;
            height: 100%;
            background-color: rgb(254,204,0);
            position: absolute;
            left: 30%;
            transform: translateX(-50%);
        }
        .inBox2{
            width: 100%;
            height: 60px;
            background-color: rgb(254,204,0);
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>
    <div class="outBox">
        <div class="inBox1"></div>
        <div class="inBox2"></div>
    </div>
</body>
</html>
