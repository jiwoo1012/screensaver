<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과제 03_응용버전2</title>
    <style>
        .box{
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 600px;
            height: 200px; 
            
        }
        .one{
            width: 100px;
            height: 100px;
            background-color: rgb(255, 255, 255);
            border: 2px solid rgb(201, 248, 201);
            border-radius: 100px;
            text-align: center;
            line-height: 100px;
            font-size: 40px;
            font-size: bold;
            color: #333;
            transition: all 0.2s;
        }
        .one:hover{
            box-shadow: 1px 1px 10px rgb(167, 224, 167);
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="one">1</div>
        <div class="one">2</div>
        <div class="one">3</div>
        <div class="one">4</div>
    </div>

</body>
</html>
