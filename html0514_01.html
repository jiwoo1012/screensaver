<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        header{
            width: 100%;
            height: 90px;
        }
        .nav{
            display: flex;
            justify-content: center; /*가로 가운데*/
            /* align-items: center;     세로 가운데 */
            width: 100%;
            height: 90px;
            background-color: darkblue;
            color: white;
            transition: all 0.6s;
        }
        .nav.on{
            width: 100%;
            height: 450px;
        }
        .logoBox{
            display:flex ;
            justify-content: center;
            align-items: center;
            width: 20%;
            height: 100%;
            font-size: 45px;
            font-weight: bold;
            /* background-color: pink; */
        }
        .gnb{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 70%;
            height: 100%;
            /* background-color: skyblue; */
        }
        
        .gnb>li{
            display: flex;
            justify-content: center;
            align-items: center;
            width: calc(90%/3);
            height: 90px;
            /* background-color: gold; */
        }
    </style>
</head>
<body>
    <header>
        <nav class="nav">
            <div class="logoBox"><a href="#" onclick="onpage()">logo</a></div>
            <ul class="gnb">
                <li>
                    <a href="#" onclick="onpage()">회사 소개</a>
                    <ul class="snb">
                        <li><a href="#" onclick="onpage()">회사 연혁</a></li>
                        <li><a href="#" onclick="onpage()">회사 기술</a></li>
                    </ul>
                </li>
                <li><a href="#" onclick="onpage()">상품 소개</a></li>
                <li><a href="#" onclick="onpage()">고객 문의</a></li>
            </ul>
        </nav>
    </header>
    <!-- 자바스크립트 -->
     <script>
        let gnb=document.querySelector(".gnb")
        let nav=document.querySelector(".nav")

        gnb.addEventListener("mouseenter", function(){
            nav.classList.add("on")
        })
        gnb.addEventListener("mouseleave", function(){
            nav.classList.remove("on")
        })
     </script>
</body>
</html>
