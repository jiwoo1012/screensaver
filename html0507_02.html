<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        .wrap{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
            width: 70%;
            height: 80vh;
            margin: 30px auto;
        }
        .bigBox{
            width: 70%;
            height: 60%;
            border: 1px solid #888;
            border-radius: 6px;
        }
        .bigBox img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
        }
        .smallBox{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 70%;
            height: 30%;
            border-radius: 10px;
        }
        .smallImg{
            width: 30%;
            height: 50%;
        }
        .smallImg img{
            width: 100%;
            height: 100%;
            box-shadow: 1px 1px 3px rgba(0,0,0, 0.7);
            border-radius: 10px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="bigBox">
            <img id="big" src="./img/tlrP1.JPG" alt="tlrP">
        </div>
        <div class="smallBox">
            <div class="smallImg">
                <img src="./img/tlrP1.JPG" alt="tlrP2">
            </div>
            <div class="smallImg">
                <img src="./img/tlrP2.JPG" alt="tlrP2">
            </div>
            <div class="smallImg">
                <img src="./img/tlrP3.JPG" alt="tlrP3">
            </div>
            <div class="smallImg">
                <img src="./img/tlrP4.JPG" alt="tlrP4">
            </div>
        </div>
    </div>
    <!-- ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ이제부터 자바스크립트ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ -->
     <script>
        let big= document.querySelector('#big')
        let smallImg=document.querySelectorAll('.smallImg img')

        smallImg.forEach(function(item){
            item.addEventListener("mouseenter",()=>{
                big.src=item.src
            })
        })
        smallImg.forEach(function(item){
            item.addEventListener("click",()=>{
                big.src=item.src
            })
        })
     </script>
</body>
</html>
