<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0; padding: 0;}
        html{
            scroll-behavior: smooth;
        }
        header{
            width: 100%;
            height: 40px;
            background-color: #00416A;
            position: fixed;
            z-index: 10;
        }
        ul{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            list-style: none;
        }
        a{
            text-decoration: none;
            color: white;
            line-height: 40px;
        }
        .top{
            background: #00416A;
            width: 50px;
            height: 50px;
            border-radius: 45%;
            position: fixed;
            z-index: 10;
            bottom: 10px;
            right: 10px;
            text-align: center;
            line-height: 50px;
            box-shadow: rgba(0, 0, 0, 0.07) 0px 1px 2px, rgba(0, 0, 0, 0.07) 0px 2px 4px, rgba(0, 0, 0, 0.07) 0px 4px 8px, rgba(0, 0, 0, 0.07) 0px 8px 16px, rgba(0, 0, 0, 0.07) 0px 16px 32px, rgba(0, 0, 0, 0.07) 0px 32px 64px;
        }
        #top{
            color: #E4E5E6;
        }

        section{
            position: relative;
        }
        #box1{
            background: linear-gradient(60deg, #00416A, #E4E5E6);
            width: 100%;
            height: 100vh;
        }
        #box2{
            background: linear-gradient(60deg, #E4E5E6, #00416A);
            width: 100%;
            height: 100vh;
        }
        #box3{
            background: linear-gradient(60deg, #00416A, #E4E5E6);
            width: 100%;
            height: 100vh;
        }
        p{
            background-color: white;
            width: 600px;
            height: 200px;
            border: 1px solid #E4E5E6 ;
            box-shadow: rgb(204, 219, 232) 3px 3px 6px 0px inset, rgba(255, 255, 255, 0.5) -3px -3px 6px 1px inset;;
            border-radius: 10px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            text-align: center;
            font-size: 50px;
            line-height: 200px;
            font-weight: bold;
        }
        .left{
            position: fixed;
            left: 10px;
            top: 50%;
            transform: translateY(-50%); 
            display: flex;
            z-index: 10;
            flex-direction: column;
            gap: 30px;
        }
        .left a{
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e1f4ff;
            color: white;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            text-decoration: none;
            font-weight: bold;
            border: 1.5px solid #00416A;
            box-shadow: rgb(204, 219, 232) 3px 3px 6px 0px inset, rgba(255, 255, 255, 0.5) -3px -3px 6px 1px inset;;
        }
    </style>
</head>
<body>
    <header>
        <ul>
            <li><a href="#box1">HOME</a></li>
            <li><a href="#box2">ABOUT</a></li>
            <li><a href="#box3">CONTACT</a></li>
        </ul>
    </header>

    <div class="left">
        <a href="#box1"></a>
        <a href="#box2"></a>
        <a href="#box3"></a>
    </div>

    <div class="top">
        <ul>
            <li><a href="#box1" id="top">top</a></li>
        </ul>
    </div>

    <section id="box1"><p>HOME</p></section>
    <section id="box2"><p>ABOUT</p></section>
    <section id="box3"><p>CONTACT</p></section>


</body>
</html>
