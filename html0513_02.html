<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        section{
            width: 100%;
            height: 100vh;
        }
        section:nth-child(1){
            background-color: pink;
        }
        section:nth-child(2){
            background-color: rgb(255, 121, 143);
        }
        section:nth-child(3){
            background-color: rgb(173, 52, 72);
        }
        .first, .second, .third {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 10px;
        }
        .box{
            width: 400px;
            height: 150px;
            background-color: #fff;
            border-radius: 20px;
            text-align: center;
            line-height: 150px;
            font-size: 25px;
        }
        .box.down{
            transform: translateY(100px);
            opacity: 0.5;
            transition: all 1s;
        }
        .box.right{
            transform: translateX(200px);
            opacity: 0.5;
            transition: all 1s;
        }
        .box.left{
            transform: translateX(-200px);
            opacity: 0;
            transition: all 0.5s;
        }
        .box.on{
            transform: translate(0,0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <section>
        <div class="first">
            <div class="box down">아래에서 올라오는 텍스트</div>
            <div class="box right">오른쪽에서 날아오는 텍스트</div>
            <div class="box left">왼쪽에서 날아오는 텍스트</div>
        </div>
    </section>
    <section>
        <div class="second">
            <div class="box right">오른쪽에서 날아오는 텍스트</div>
            <div class="box down">아래에서 올라오는 텍스트</div>
            <div class="box left">왼쪽에서 날아오는 텍스트</div>
        </div>
    </section>
    <section>
        <div class="third">
            <div class="box left">왼쪽에서 날아오는 텍스트</div>
            <div class="box down">아래에서 올라오는 텍스트</div>
            <div class="box right">오른쪽에서 날아오는 텍스트</div>
        </div>
    </section>
    <!-- ㅡㅡㅡㅡㅡㅡㅡㅡㅡ자바스크립트 시작ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ -->
     <script>
        let boxes=document.querySelectorAll(".box")
        let observer=new IntersectionObserver(function(entries){
            entries.forEach(function(item){
                if(item.isIntersecting){
                    item.target.classList.add("on")
                }else{
                    item.target.classList.remove("on")
                }
            })
        },{
            threshold:0.3
        })

        boxes.forEach(function(item){
            observer.observe(item)
        })
     </script>
</body>
</html>
