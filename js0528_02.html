<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- setTimeout(function(){
        document.write("안녕")
    },1000)   -> 비동기방식의 대표적인 방법임.
    
    1초 후에 "안녕"이라는 글자가 출력된다. -->
    <script>
        let kbs=new Promise((resolve, reject)=>{
            setTimeout(()=>{
                resolve("작업 준비 완료 ")
            },1000)
        })
        kbs.then((v)=>{
            document.write("작업 진행 순서 0: ", v)
            return v+"콜라 "
        })   //어떤 작업을 맡기든 간에 promise안에 자기 안에서 계속 일을 하다가 일이 끝나면 resolve를 보냄. then은 작업이 끝났다는 확신이 있어야 사용 가능.

        .then((k)=>{
            document.write("<br>", "다음 순서: ", k)
            return k+ "+ 빨대"
        })

        .then((b)=>{
            document.write("<br>", "then 3:  ", b)
        })
        .then((s)=>{
            document.write("<br>", "then 4: ", s)
            throw new Error("빨대가 없어요.")
        })
        .catch((e)=>{
            document.write("<br>", "catch 발생: ", e)
        })
        .finally(()=>{   //성공, 실패 상관 없이 무조건 마지막에 실행함. 값 전달을 하지 않음 , 그래서 변수 이름이 없음.
            document.write("<br>", "무조건 일해!!")
        })

        //어떤 일을 맡기고 기다렸다가 성공하면 res로, 실패하면 rej으로. then의 성질은 계속 이어서 작업할 수 있다는 거
    </script>
</body>
</html>
