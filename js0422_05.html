<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let que=prompt("오늘은 비가 오나요?(yes 또는 no)")
        if(que==="yes"){
            let que1=prompt("우산을 가지고 있나요?")
            if(que1==="yes"){
                document.write("우산이 있어서 다행이네요!")
            }else{
                document.write("우산이 없으면 젖어요! 조심하세요.")
            }
        }else{
            document.write(".")
        }
    </script>
</body>
</html>
