<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border-collapse: collapse;
            border: 1px solid black;

        }
        th{
            background-color: skyblue;
            border: 1px solid red;
            padding: 10px;
        }
        tr,td{
            padding: 10px;
            border: 1px solid black;
            text-align: center;
        }
        .line{
            background-color:  gold;
        }
        .hit{
            background-color: red;
            color: white;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>번호</th>
            <th>이름</th>
            <th>국어 성적</th>
            <th>영어 성적</th>
        </tr>
        <tr>
            <td>1</td>
            <td>홍길동</td>
            <td class="hit">100점</td>
            <td>10점</td>
        </tr>
        <tr class="line">
            <td>2</td>
            <td>이순신</td>
            <td>100점</td>
            <td>10점</td>
        </tr>
    </table>
</body>
</html>
