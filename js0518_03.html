<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="display"></div>

    <script>
        function call(name,age){
            this.na=name
            this.ag=age
            this.calls()
                let dis=`${this.na} 님의 나이는 ${this.ag}입니다.`
                return dis
            }
        
        let display = document.querySelector(".display")

        let allcall=[
            new call("홍길동", 22),
            new call("강감찬", 22),
            new call("이순신", 22),
            new call("이이", 22),
            new call("이황", 22)
        ]

        allcall.forEach(function(item){
            display.innerHTML+=item.calls()
        })
        
        
    </script>
</body>
</html>
