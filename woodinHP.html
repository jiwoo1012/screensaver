<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우딘 카피 홈페이지</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        header{
            width: 100%;
            height: 90px;
            background-color: #F3F3F3;
        }
        nav{
            display: flex;
            justify-content: start;
            align-items: flex-start;
            width: 100%;
            height: 90px;
            overflow: hidden;
            position: fixed;
            left: 0; top: 0;
            z-index: 1;
            transition: all 0.3s;
            background-color: #F3F3F3;
        }
        nav.on{
            height: 400px;
        }
        .logo{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 15%;
            height: 90px;
            background-image: url('https://www.wood.co.kr/images/common/logo.png');
            background-repeat: no-repeat;
            background-size: 150px 31px;
            background-position: center;
            position: sticky;
            top: 0;
        }
        .gnb{
            display: flex;
            justify-content: center;
            width: 40%;
            height: 100%;
            background-color: #F3F3F3;
            color: #333;
        }
        .gnb>li{
            display: flex;
            align-items: start;
            flex-direction: column;
            width: calc(100%/4);
            font-size: 25px;
            font-weight: 600;
            padding-left: 20px;
            padding-top: 30px;
        }
        .snb{
            width: 100%;
            font-size: 20px;
            font-weight: 400;
            margin-top: 40px;
        }
        #page1{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-color: #F3F3F3;
        }
        #page1>.img1{
            background-image: url('https://www.wood.co.kr/data/main/file1_16443788194yu100nyd2.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            width: 98%;
            height: calc(100vh - 150px);
            border-radius: 10px;
            color: white;
            font-family: "Montserrat";
            font-size: 55px;
            font-weight: 100;
            margin: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <header>
        <nav class="nav">
            <div class="logo"></div>
            <ul class="gnb">
                    <li>
                        <a href="#" onclick="onpage()">브랜드</a>
                        <ul class="snb"><a href="#" onclick="onpage()">브랜드 스토리</a></ul>
                        <ul class="snb"><a href="#" onclick="onpage()">연혁 및 인증</a></ul>
                        <ul class="snb"><a href="#" onclick="onpage()">CI&BI</a></ul>
                        <ul class="snb"><a href="#" onclick="onpage()">오시는 길</a></ul>
                    </li>
                    <li>
                        <a href="#" onclick="onpage()">스토리</a>
                        <ul class="snb"><a href="#" onclick="onpage()">미디어</a></ul>
                        <ul class="snb"><a href="#" onclick="onpage()">홍보</a></ul>
                        <ul class="snb"><a href="#" onclick="onpage()">협찬</a></ul>
                        <ul class="snb"><a href="#" onclick="onpage()">이벤트</a></ul>
                    </li>
                    <li>
                        <a href="#" onclick="onpage()">갤러리</a>
                        <ul class="snb"><a href="#" onclick="onpage()">컬렉션</a></ul>
                        <ul class="snb"><a href="#" onclick="onpage()">인테리어</a></ul>
                        <ul class="snb"><a href="#" onclick="onpage()">익스테리어</a></ul>
                        <ul class="snb"><a href="#" onclick="onpage()">이벤트</a></ul>
                    </li>
                    <li>
                        <a href="#" onclick="onpage()">쇼룸</a>
                        <ul class="snb"><a href="#" onclick="onpage()">전시장</a></ul>
                    </li>
            </ul>
        </nav>
    </header>
    <div class="wrap">
        <section id="page1">
            <div class="img1">
                <p>CREATING HEALING<br>SPACE ISWOODIN<br> HAUS’S TOP PRIORITY.</p>
            </div>
        </section>
    </div>
    <!-- ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ자바스크립트ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ -->
     <script>
        let gnb=document.querySelector(".gnb")
        let nav=document.querySelector(".nav")

        gnb.addEventListener("mouseenter", function(){
            nav.classList.add("on")
        })
        gnb.addEventListener("mouseleave", function(){
            nav.classList.remove("on")
        })
     </script>
</body>
</html>
