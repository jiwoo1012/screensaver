<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 500px;
            height: 50px;
            background-color: rgb(0, 137, 190);
        }
        .box1{
            width: 500px;
            height: 50px;
            background-color: rgb(0, 79, 110);
            transform: translate(30px,20px);
        }
        .box2{
            width: 500px;
            height: 50px;
            background-color: rgb(219, 224, 226);
            transform: rotate(60deg);
        }
        .box3{
            width: 500px;
            height: 50px;
            background-color: skyblue;
            transform: scale(0.7,1.3);
        }
        .box4{
            width: 500px;
            height: 50px;
            background-color: rgb(23, 76, 97);
            transform: skew(15deg, 10deg);
        }
        .box5{
            width: 500px;
            height: 50px;
            background-color: rgb(85, 124, 139);
            transform: matrix(1,-0.1, 0, 1, 0, 0);
        }
    </style>
</head>
<body>
    <div class="box">original</div>
    <div class="box1">transition</div>
    <div class="box2">rotate</div>
    <div class="box3">scale</div>
    <div class="box4">skew</div>
    <div class="box5">matrix</div>
</body>
</html>
