<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap{
            width: 600px;
            height: 10px;
            padding: 5px 0;
            background-color: #ccc;
        }
        .bar{
            width: 0%; /*애니메이션이 0%에서 100%로 변하는 친구, 점점점점 커지는 역할*/
            height: 10px;
            background-color: orange;
            position: relative;
            border-radius: 0 100px 50px 0 ;

            animation: barMove 3s infinite; /*중간에 , 없애야 함*/
        }

        .cir{
            width: 12px;
            height: 12px;
            background-color: #ffffff;
            border-radius: 50%;
            position: absolute;
            right: 0;
        }

        @keyframes barMove{
            0%{
                width: 0;
                
            }
            100%{
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="bar">
            <div class="cir"></div>
        </div>
    </div>
</body>
</html>
