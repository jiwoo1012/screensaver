<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이름을 받고 환영 메시지 출력하기</title>
</head>
<body>
    <!--이름을 받고 환영 메시지 출력하기
        세 개의 숫자를 받고 3개의 숫자의 합을 구하기
        임의의 배열을 만들고, 배열의 총합계 구하기-->
    <div class="contain">
        <input id="name" type="text" placeholder="이름을 입력하세요.">
        <button onclick="hello()">인사</button>
        <div class="dis"></div>
    </div>
    <script>
        function hi(na){
            return `${na} 님 환영합니다.`
        }
        function hello(){
            let name=document.querySelector('#name').value
            let ans= hi(name) //다른 함수에서 재활용이 가능하다는 걸 보여주기 위해 함수를 두 번 사용하는 것임.
            document.querySelector('.dis').innerHTML=ans
        }
    </script>
</body>
</html>
