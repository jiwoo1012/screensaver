<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        section{
            width: 100%;
            height: 100vh;
            padding: 100px;
        }
        section:nth-child(1){
            background-color: skyblue;
        }
        section:nth-child(2){
            background-color: rgb(0, 172, 240);
        }
        .box{
            width: 300px;
            height: 100px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
            transition: all 0.3s;
        }
        .box.up{
            transform: translateY(150px);
            opacity: 0.1;
        }
        .box.on{
            transform: translate(0,0);
            opacity: 1; /*투명도*/
        }
        .box.left{
            transform: translateX(200px);
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <section>
        <div class="box up">위로 올라옴</div>
    </section>
    <section>
        <div class="box left">왼쪽에서 등장</div>
    </section>
    <!-- 자바스크립트 시작 -->
    <script>
        let boxes=document.querySelectorAll('.box')
        let observer=new IntersectionObserver(function(entries){    //new: 생성 명령어
            entries.forEach(function(item){
                if(item.isIntersecting){    //실시간으로 감지하라는 거
                    item.target.classList.add("on")
                }
            })
        },{  
            threshold: 0.3//객체가 얼마나 보여야 작동할까? 화면에 0.3만 보여도 작동을 해라.
        }) 
        boxes.forEach(function(item){
            observer.observe(item)   //내가 만든 오브저버를 오브저브에 각 아이템에 적용시키는 것. 실시간으로 감시하고 있어.
            //실시간으로 감지하다가 내 눈에 딱 들어오면 클래스를 on으로 붙일 거야.
        })
    </script>
</body>
</html>
