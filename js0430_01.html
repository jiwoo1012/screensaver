<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계산기</title>
    <style>
        body{
            /* background-image: url('./img/bg1.png'),url('./img/bg1.png'), linear-gradient(#e0e0e0, white);
            background-size: 1000px,1000px, cover;
            background-position: 780px 30px,-490px 30px, center;
            background-repeat: no-repeat,no-repeat, no-repeat; */
            /* background-image: url('./img/bg5.png'), linear-gradient(#da1e1e, white); */
            background-image: linear-gradient(rgba(224, 224, 224, 0.4), rgba(255,255,255,0.4)), url('./img/bg5.png');
            background-size: cover, cover;
            background-repeat: no-repeat, no-repeat;
        }
        .cul{
            display: flex;
            padding-top: 20px;
            flex-direction: column;
            gap: 20px;
            width: 300px;
            height: 480px;
            background-color: #333;
            border-radius: 15px;
            position: relative;
            left: 50%;
            top: 60px;
            transform: translateX(-50%);
            box-shadow: rgb(100, 100, 111) 0px 7px 29px 0px;
        }
        #dis{
            display: flex;
            justify-content: end;
            align-items: center;
            padding-right: 10px;
            width: 250px;
            height: 50px;
            border: 3px solid #333;
            background-color: #fff;
            border-radius: 15px;
            font-size: 25px;
            font-weight: bold;
            color: #333;
            position: relative;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: #a3a2a2 3px 3px 6px 0px inset, rgba(255, 227, 227, 0.5) -3px -3px 6px 1px inset;
        }
        .outBox{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-wrap: wrap;
            padding: 20px 15px;
            gap: 15px;
        }
        .outBox div{
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            background-color: #F4D0D8;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 25px;
            font-weight: bold;
            box-shadow: #c4909b 3px 3px 6px 0px inset, rgba(255, 227, 227, 0.5) -3px -3px 6px 1px inset;
        }
        .outBox .op{
            background-color: #808080;
            color: white;
            box-shadow: #585858 3px 3px 6px 0px inset, rgba(255, 227, 227, 0.5) -3px -3px 6px 1px inset;
        }
        .outBox .back{
            background-color: #ff6486;
            color: white;
            box-shadow: #ff325e 3px 3px 6px 0px inset, rgba(255, 227, 227, 0.5) -3px -3px 6px 1px inset;
        }
        .outBox .clear{
            background-color: #ff6486;
            color: white;
            box-shadow: #ff325e 3px 3px 6px 0px inset, rgba(255, 227, 227, 0.5) -3px -3px 6px 1px inset;
        }
        .outBox .ans{
            width: 100%;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="cul">
        <div id="dis">0</div>
        <div class="outBox">
            <div class="box num" data-num="7">7</div>
            <div class="box num" data-num="8">8</div>
            <div class="box num" data-num="9">9</div>
            <div class="box op" data-num="/">÷</div>
            <div class="box num" data-num="4">4</div>
            <div class="box num" data-num="5">5</div>
            <div class="box num" data-num="6">6</div>
            <div class="box op" data-num="*">x</div>
            <div class="box num" data-num="1">1</div>
            <div class="box num" data-num="2">2</div>
            <div class="box num" data-num="3">3</div>
            <div class="box op" data-num="-">-</div>
            <div class="box clear" data-num="clear">C</div>
            <div class="box num" data-num="0">0</div>
            <div class="box back" data-num="back">←</div>
            <div class="box op" data-num="+">+</div>
            <div class="box ans" data-num="=">=</div>
        </div>
    </div>
    <script>
        const dis=document.querySelector("#dis")
        const boxs=document.querySelectorAll(".box")
        let expr=''

        boxs.forEach((item)=>{
            item.addEventListener("click", ()=>{
                let v=item.dataset.num

                if(v==="clear"){
                    expr=''
                    dis.innerHTML=0
                    return
                }
                if(v==="back"){
                    expr=expr.slice(0,-1)
                    dis.innerHTML=expr ===''? 0:expr
                    return
                }
                if(v==="="){
                    if(expr===''||expr.endsWith("+")||expr.endsWith("-")||expr.endsWith("/")||expr.endsWith("*")){
                        dis.innerHTML='Error'
                        expr=''
                        return
                    }
                    let ans=eval(expr)
                    dis.innerHTML=Number(ans).toLocaleString()
                    expr=String(ans)
                    return
                }
                expr+=v
                dis.innerHTML=expr
            })
        })
    </script>
</body>
</html>
