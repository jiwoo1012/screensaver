<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        body{
            width: 100%;
            height: 100vh;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .wrap{
            width: 80%;
            height: calc(100vh - 70px);
            background-color: rgba(255, 255, 255, 0.5);
            box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
            border-radius: 50px;
            margin: 30px auto;
            display: flex;
            align-items: center;
            gap: 50px;
        }
        .leftBox{
            width: 120px;
            height: 90%;
            background-color: rgba(238, 237, 237, 0.5);
            box-shadow: rgba(0, 0, 0, 0.06) 0px 2px 4px 0px inset;
            opacity: 1;
            border-radius: 80px;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            flex-direction: column;
            margin-left: 40px;
        }

        button{
            font-size: 15px;
            font-weight: 700;
        }

        button:hover{
            box-shadow: rgb(190, 204, 216) 3px 3px 6px 0px inset, rgba(255, 255, 255, 0.5) -3px -3px 6px 1px inset;
            padding: 17px;
            border-radius: 40px;
            color: white;
            text-shadow: 2px 2px 8px rgba(202, 202, 202, 0.7);
        }

        #start{
            width: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #start h1{
            box-shadow: rgba(50, 50, 105, 0.15) 0px 2px 5px 0px, rgba(0, 0, 0, 0.05) 0px 1px 1px 0px;
            border-radius: 50px;
            text-align: center;
            font-size: 80px;
            padding: 40px  80px 40px 80px;
        }

        .mainBox{
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 80%;
            height: 100%;
        }
        #cityName{
            font-size: 80px;
            font-weight: 600;
            margin-bottom: 70px;
            color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }
        #icon{
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
        }
        #dis{
            font-size: 50px;
            font-weight: 600;
            color: #333;
        }
        #wind{
            font-size: 25px;
            
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="leftBox">
            <button onclick="getWeather('Seoul')">Seoul</button>
            <button onclick="getWeather('Busan')">Busan</button>
            <button onclick="getWeather('Seongnam')">Seongnam</button>
            <button onclick="getWeather('Gimcheon')">Gimcheon</button>
        </div>

        <div id="start">
            <h1>오늘의 날씨를<br>확인하세요</h1>
        </div>

        <div class="mainBox">
            <div id="cityName"></div>
            <img id="icon" alt="날씨 아이콘">
            <div id="dis">온도: </div>
            <div id="wind">풍속: </div>
        </div>
    </div>
    
    <script>
        let body=document.querySelector("body")
        let start=document.querySelector("#start")
        let dis=document.querySelector("#dis")
        let icon=document.querySelector("#icon")
        let wind=document.querySelector("#wind")
        let cityName=document.querySelector("#cityName")
        let mainBox=document.querySelector(".mainBox")

        const API_KEY='b86112e4d21c738accd50dcbb9d48e18'

        async function getWeather(cityname){
            start.style.display="none"
            mainBox.style.display="flex"
            //도시 이름
            cityName.innerHTML=cityname

            //도시사진
            if(cityname==="Seoul"){
                body.style.backgroundImage= `url(https://cdn.sanity.io/images/nxpteyfv/goguides/0eb842b90b1bf6ba40c2af039c62640ce2745597-1600x1066.jpg)`
            }else if(cityname==="Busan"){
                body.style.backgroundImage= `url(https://images.unsplash.com/photo-1638591751482-1a7d27fcea15?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D)`
            }else if(cityname==="Seongnam"){
                body.style.backgroundImage=`url(https://mimg.segye.com/content/image/2025/08/04/ori/20250804500096.jpg)`
            }else if(cityname==="Gimcheon"){
                body.style.backgroundImage=`url(https://images.unsplash.com/photo-1649859117535-8a79325c1c57?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D)`
            }
            
            let res=await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cityname}&appid=${API_KEY}&units=metric&lang=kr`)
            let data=await res.json()

            //온도
            dis.innerHTML=data.main.temp + "℃";

            //아이콘
            let icon_i=data.weather[0].icon;
            let iconUrl=`http://openweathermap.org/img/wn/${icon_i}@2x.png`
            icon.setAttribute('src',iconUrl)

            //풍속
            wind.innerHTML=data.wind.speed+ "m/s"

        }
    </script>
</body>
</html>
