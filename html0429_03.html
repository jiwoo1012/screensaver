<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 600px;
            height: 250px;
            background-image: url('./img/tree.png'),url('./img/flower.png'), linear-gradient(135deg, #EDE574, #E1F5C4);
            background-size: 100px 100px, 100px 100px, cover;
            background-repeat: no-repeat, no-repeat, no-repeat;
            background-position: left 10px bottom 20px, right 10px top 10px, left;
            font-size: 23px;
        }
        strong{
            color: green;
        }
    </style>
</head>
<body>
    <div class="box">지금은  <strong>백그라운드 이미지 연습</strong>  중입니다.</div>
        
</body>
</html>
