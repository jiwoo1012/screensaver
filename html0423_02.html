<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채소 소개 표</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&family=Do+Hyeon&family=Jua&family=Kirang+Haerang&display=swap" rel="stylesheet">
    <style>
        *{margin: 0; padding: 0;}
        h1{
            font-size: 30px;
            margin: 10px auto;
            text-align: center;
        }
        img{
            display: block;
            width: 200px;
            height: 200px;
            object-fit: cover;
            margin: 10px auto;
        }
        table{
            border: 1px solid #485935;
            border-collapse: collapse;
            width: 450px;
            height: 170px;
            font-family: "Kirang Haerang", system-ui;
            font-weight: 400;
            margin: 10px auto;
        }
        th{
            border: 1px solid #485935;
            background-color: #93A267;
            color: #000000;
        }
        tr,td{
            padding: 10px;
            text-align: center;
            border: 1px solid #485935;
            color: #5a4545;
            
        }
        .dang{
            background-color: #CFE1B9;
        }
        .sig{
            background-color: #FBFBFB;
        }
        .bro{
            background-color: #CADBB7;
        }
        
    </style>
</head>
<body>
    <h1>채소 소개 표</h1>
    <img src="./img/img5.JPG" alt="채소 이미지">
    <table>
        <tr>
            <th>채소</th>
            <th>특징</th>
        </tr>
        <tr class="dang">
            <td>당근</td>
            <td>비타민 A 풍부</td>
        </tr>
        <tr class="sig">
            <td>시금치</td>
            <td>철분과 미네랄 풍부</td>
        </tr> 
        <tr class="bro">
            <td>브로콜리</td>
            <td>항산화 성분 가득</td>
        </tr>
    </table>
</body>
</html>
