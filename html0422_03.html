<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0; padding: 0;}
        .outBox{
            width: 300px;
            height: 300px;
            border: 1px solid rgb(255, 189, 68);
            position: relative;
        }
        .outBox img{
            width: 100%;
            height: 100%;
        }
        .inBox{
            background-color: #333;
            width: 80px;
            height: 40px;
            color: white;
            text-align: center;
            line-height: 40px;
            position: absolute;
            bottom: 10px;
            right: 10px;
        }
    </style>
</head>
<body>
    <div class="outBox">
        <img class="img" src="./img/img3.JPG" />
        <div class="inBox">3:40:27</div>
    </div>
</body>
</html>
