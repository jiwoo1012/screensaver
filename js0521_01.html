<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        .wrap{
            width: 400px;
            margin: 30px auto;
            background-color: skyblue;
            padding: 20px;
            border-radius: 10px;
        }
        .screen{
            width: 100%;
            height: 60px;
            background-color: #f3f3f3;
            border-radius: 10px;
            font-size: 25px;
            text-align: right;
            font-weight: bold;
            padding: 15px;
            overflow: hidden;
        }
        .btnBox{
            display: grid;
            grid-template-columns: repeat(4,1fr);  /*내가 칸을 얼마나 가져가? 1fr: 뒤에는 가로 크기 자동적으로 1;1 비율로 만들어라라는 뜻*/
            gap: 10px;
            margin-top: 30px;
        }
        .btnBox button{
            height: 70px;
            background-color: #777;
            border-radius: 10px;
            color: white;
            font-size: 20px;
        }
        .btnBox button:hover{
            background-color: #333;
        }
        .btnBox button.lastBtn{
            grid-column: span 4;  /*4칸을 하나로 합쳐주세요라는 뜻*/
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="screen">0</div>
    
        <div class="btnBox">
            <button onclick="backSpace()">&#8592;</button>
            <button onclick="clearN()">C</button>
            <button onclick="setOp('/')">/</button>
            <button onclick="setOp('*')">X</button>

            <button onclick="pushNum('7')">7</button>
            <button onclick="pushNum('8')">8</button>
            <button onclick="pushNum('9')">9</button>
            <button onclick="setOp('-')">-</button>

            <button onclick="pushNum('4')">4</button>
            <button onclick="pushNum('5')">5</button>
            <button onclick="pushNum('6')">6</button>
            <button onclick="setOp('+')">+</button>

            <button onclick="pushNum('1')">1</button>
            <button onclick="pushNum('2')">2</button>
            <button onclick="pushNum('3')">3</button>
            <button style="background-color: rgb(248, 156, 156);" onclick="calc('=')">=</button>
            
            <button class="lastBtn" onclick="pushNum('0')">0</button>
            <!-- <button style="grid-column: span 4;" onclick="pushNum('0')">0</button> 이렇게 스타일 한 줄만 넣을 거면 여기서 스타일을 열어서 바로 들고와도 됨. -->
        </div>
    </div>
    <script>
        class Calculator{
            constructor(num1, num2){
            this.num1=num1
            this.num2=num2
            }

            plus(){
                return this.num1+this.num2
            }
            minus(){
                return this.num1-this.num2
            }
            multi(){
                return this.num1*this.num2
            }
            divide(){
                return this.num1/this.num2
            }
        }

        let current=""  //초기화
        let firstNum="" //숫자로 환산하기 전에 기억하고 있는 친구
        let operator=''

        function backSpace(){
            current=current.slice(0, -1)
            updateScreen()
        }
        function clearN(){
            document.querySelector(".screen").innerHTML="0"
            current=''
            firstNum=''
            let operator=''
        }
        function updateScreen(){
            let screen=document.querySelector(".screen")
            if(current===""){  //error 방지
                screen.innerHTML="0"
                return  //다시 쌓을 수 있도록 기회를 줌
            }
            screen.innerHTML=Number(current).toLocaleString()
        }

        function pushNum(num){  //숫자를 찍으면 찍혀 나오는 역할을 도와줌
            current+=num    
            updateScreen()
        }

        function setOp(op){
            if(current===''){
                return
            }
            firstNum=Number(current)
            operator=op
            
            current=''  //두 번째 숫자를 받을 준비
        }
    
        function calc(){
            if(current==="") return
            let secondNum=Number(current)

            let item=new Calculator(firstNum, secondNum)

            let result=0 //결과값의 초기값을 줌

            switch(operator){
                case "+" :
                    result=item.plus()
                    break
                case "-" :
                    result=item.minus()
                    break
                case "*" :
                    result=item.multi()
                    break
                case "/" :
                    result=item.divide()
                    break
            }
            document.querySelector(".screen").innerHTML=result.toLocaleString()
        }
    </script>
</body>
</html>
