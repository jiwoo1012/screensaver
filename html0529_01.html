<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        .wrap{
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        .wrap video{
            width: 100%;
            height: 100%;
            object-fit: cover;

            position: absolute;
            left: 0; top: 0;         /*모두 같은 자리에 위치*/

            /* display: none; */
            opacity: 0;
            transition: all 0.7s;
        }
        .wrap video.on{
            /* display: block; */
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <video muted playsinline>
            <source src="./mp4/car1.mp4" type="video/mp4">
        </video>
        <video muted playsinline>
            <source src="./mp4/car2.mp4" type="video/mp4">
        </video>
        <video mutedplaysinline>
            <source src="./mp4/car4.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 자바스크립트 시자그ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ -->

    <script>
        let video=document.querySelectorAll("video")
        let index= 0

        video[index].classList.add("on")
        video[index].play()

        setInterval(function(){
            video[index].pause()
            video[index].classList.remove("on")

            index++
            
            //마지막이 넘으면 처음으로!!
            if(index >= video.length){
                index=0
            }
            //현재 영상 플레이 위치를 처음으로 설정
            video[index].currentTime=0
            video[index].classList.add("on")
            video[index].play()
        },5000)
    </script>
</body>
</html>
