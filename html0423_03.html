<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border: 1px solid #333;
            border-collapse: collapse;
        }
        th{
            border: 1px solid white;
            padding: 10px;
        }
        tr,td{
            text-align: center;
            border: 1px solid #333;
            padding: 10px;
        }
        .title{
            color: white;
            background-color: #333;
        }
    </style>
</head>
<body>
    <table>
        <tr class="title">
            <th>시간</th>
            <th>월요일</th>
            <th>화요일</th>
            <th>수요일</th>
            <th>목요일</th>
        </tr>
        <tr>
            <td>09:00</td>
            <td>영어</td>
            <td>수학</td>
            <td>과학</td>
            <td>체육</td>
        </tr>
        <tr>
            <td>10:00</td>
            <td>국어</td>
            <td>영어</td>
            <td>사회</td>
            <td>음악</td>
        </tr>
        <tr>
            <td>11:00</td>
            <td colspan="2">프로젝트 수업</td>
            <td>수학</td>
            <td>미술</td>
        </tr>
    </table>
</body>
</html>
