<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css" >
    <style>
        header{
            width: 100%;
        }
        #nav{
            width: 100%;
            height: 70px;
            background-color: skyblue;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
        }
        #nav.on{
            height: 470px;
        }
        #nav > div{
            width: 25%;
            font-size: 35px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gnb{
            width: 75%;
            height: 70px;
            display: flex;
            justify-content: space-around ;
        }
        .gnb > li {
            /* width : 25%; */
            width: calc(100%/4) ;
            height: 70px;
            line-height: 70px;
        }
        .gnb > li > a{
            width: 100%;
            height: 100%;
            display: block;
        }

        .snb{
            display: none;
        }

        .snb > li{
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div id="nav">
            <div><a href="#">logo</a></div>
            <ul class="gnb">
              <li>
                <a href="#">아트</a>
                <ul class="snb">
                    <li><a href="#">아트1</a></li>
                    <li><a href="#">아트2</a></li>
                </ul>
              </li>
              <li>
                <a href="#">가구</a>
                <ul class="snb">
                    <li><a href="#">가구1</a></li>
                    <li><a href="#">가구2</a></li>
                    <li><a href="#">가구3</a></li>
                    <li><a href="#">가구4</a></li>
                </ul>
            </li>
              <li>
                <a href="#">조명</a>
                <ul class="snb">
                    <li><a href="#">조명1</a></li>
                    <li><a href="#">조명2</a></li>
                    <li><a href="#">조명3</a></li>
                </ul>
            </li>
              <li>
                <a href="#">라이프</a>
                <ul class="snb">
                    <li><a href="#">라이프1</a></li>
                    <li><a href="#">라이프2</a></li>
                    <li><a href="#">라이프3</a></li>
                    <li><a href="#">라이프4</a></li>
                    <li><a href="#">라이프5</a></li>
                    <li><a href="#">라이프6</a></li>
                </ul>
              </li>
            </ul>
        </div>
    </header>

    <script>
        let nav = document.querySelector("#nav")
        let gnb = document.querySelector(".gnb")
        let snb = document.querySelectorAll(".snb")

        gnb.addEventListener("mouseover", function(){
            nav.classList.add("on");
            setTimeout(function(){
                for(let i=0; i<snb.length; i++){
                    snb[i].style.display = "block"
                }
            }, 300)

        })

        gnb.addEventListener("mouseout", function(){
            nav.classList.remove("on");
            setTimeout(function(){
                for(let i=0; i<snb.length; i++){
                    snb[i].style.display = 'none'
                }
            },300)

        })
    </script>
</body>
</html>
