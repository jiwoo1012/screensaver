<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문제 4</title>
</head>
<body>
    <script>
        let num1=Number(prompt("숫자 1을 입력해주세요."))
        let num2=Number(prompt("숫자 2를 입력해주세요."))
        let num3=Number(prompt("숫자 3을 입력해주세요."))
        let num4=Number(prompt("숫자 4를 입력해주세요."))
        let mul=num1*num2
        let add=num3+num4

        document.write(num1+"과 "+num2+"의 곱은 "+mul+"입니다."+"<br>")
        document.write(num3+"과 "+num4+"의 합은 "+add+"입니다.")
    </script>
</body>
</html>
