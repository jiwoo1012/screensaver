        //선 그리기 (moveTo와 lineTo가 한 쌍을 이루는 것만 기억하자)
        ctx.beginPath()
        ctx.strokeStyle="red"
        ctx.fillStyle="red"
        ctx.moveTo(100,100)
        ctx.lineTo(200,250)
        ctx.lineTo(300,100)
        ctx.closePath() //나머지를 채워줌
        ctx.fill()
        ctx.stroke()
