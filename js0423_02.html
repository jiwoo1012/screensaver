<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>두 개의 주사위를 던졌을 때, 두 눈의 합이 6이 되는 모든 경우의 수를 출력</title>
</head>
<body>
    <script>
        for(let i=1;i<=6;i++){
            for(let j=1;j<=6;j++){
                if(i+j==6){
                    document.write(`두 눈의 합이 6이 되는 경우의 수는 ${i}와 ${j}입니다.<br>`)
                }
            }
        }
        document.write(`------------------------------------------`)
        //구구단 출력하기

    </script>
</body>
</html>
