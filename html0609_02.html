<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./reset.css">
    <style>
        #wrap{
            width: 100%;
        }
        header{
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }
        ul{
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        /* header끝 ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ */
        article{
            width: 100%;
            height: calc(100vh - 122px);
            overflow: hidden;
            position: relative;
        }
        .slide{
            width: 100%;
            height: 100%;
            position: absolute;
            left: 0; top: 0;
        }
        .slide img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .arrow{
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.3);
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px;
            text-align: center;
            line-height: 50px;
            color: white;
        }
        .prev{
            position: absolute;
            left: 50px;
        }
        .next{
            position: absolute;
            right: 50px;
        }
        /* 네모 박스 구현 ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ */
        .nemoBox{
            display: flex;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 20px;
            z-index: 10;
        }
        .nemo{
            width: 60px;
            height: 2px;
            background-color: #333;
            opacity: 0.2;
            transition: all 0.3s;
            cursor: pointer;
        }
        .nemo.on{
            background-color: #333;
            opacity: 1;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div id="wrap">
        <header>
            <h1 class="logo">SIMMONS</h1>

            <ul class="nav">
               <li><a href="#">브랜드 소개</a></li> 
               <li><a href="#">전체 보기</a></li> 
               <li><a href="#">뷰티레스트 블랙</a></li> 
               <li><a href="#">뷰티레스트 매트리스</a></li> 
               <li><a href="#">프레임</a></li> 
               <li><a href="#">협탁</a></li>
               <li><a href="#">파운데이션</a></li> 
               <li><a href="#">펫 매트리스</a></li> 
               <li><a href="#">베딩</a></li> 
               <li><a href="#">프래그런스</a></li> 
               <li><a href="#">가구</a></li> 
               <li><a href="#">아울렛</a></li> 
            </nav>
        </header>

        <article class="sliders">
            <div class="slide">
                <img src="https://shopby-images.cdn-nhncommerce.com/Mall-No-sJ2P/20260429/153514.265236178/02_%EC%8B%9C%EB%AA%AC%EC%8A%A4_PC_banner_%ED%86%B5%ED%95%A9%EA%B8%B0%ED%9A%8D%EC%A0%84_01.jpg" alt="pororo">
            </div>
            <div class="slide">
                <img src="https://shopby-images.cdn-nhncommerce.com/Mall-No-sJ2P/20260608/095257.309662619/01_%EC%8B%9C%EB%AA%AC%EC%8A%A4_PC_banner_%EC%98%A8%EB%9D%BC%EC%9D%B8%EA%B8%B0%ED%9A%8D%EC%A0%84.jpg" alt="crong">
            </div>
            <div class="slide">
                <img src="https://shopby-images.cdn-nhncommerce.com/Mall-No-sJ2P/20260602/185556.921023921/%EC%8B%9C%EB%AA%AC%EC%8A%A4_PC_banner_%EC%98%A8%EB%9D%BC%EC%9D%B8%EC%B2%B4%ED%97%98%EC%A1%B4.jpg" alt="roofpy">
            </div>
            <div class="slide">
                <img src="https://shopby-images.cdn-nhncommerce.com/Mall-No-sJ2P/20260506/133355.410738328/PC_banner_%EC%8B%9C%EB%AA%AC%EC%8A%A4%ED%8E%98%EC%9D%B4.jpg" alt="">
            </div>
            <div class="slide">
                <img src="https://shopby-images.cdn-nhncommerce.com/Mall-No-sJ2P/20260430/100658.939074335/03_%EC%8B%9C%EB%AA%AC%EC%8A%A4_PC_banner_%EC%98%A4%ED%94%84%EB%9D%BC%EC%9D%B8%EA%B8%B0%ED%9A%8D%EC%A0%84_01-1.jpg" alt="">
            </div>

            <!-- 버튼 구현 -->
            <button class="arrow prev">&lt;</button>
            <button class="arrow next">&gt;</button>

            <!-- 네모 칸 -->
            <div class="nemoBox">
                <div class="nemo on"></div>
                <div class="nemo"></div>
                <div class="nemo"></div>
                <div class="nemo"></div>
                <div class="nemo"></div>
            </div>
        </article>
    </div>

    <!-- 제이쿼리 구현 시작 ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ -->
    <script>
        const sliders=$(".slide")
        const nemoes=$(".nemo")

        let index=0

        function moveSlide(){
            sliders.stop(true,true).fadeOut(1000)

            sliders.eq(index).stop(true,true).fadeIn(1000)

            nemoes.removeClass("on")
            nemoes.eq(index).addClass("on")
        }
        setInterval(function(){
            index++
            if(index>=sliders.length){
                index=0
            }
            moveSlide()
        },3000)

        //다음 버튼
        $(".next").on("click", function(){
            index++
            if(index>=sliders.length){
                index=0
            }
            moveSlide()
        })

        //이전 버튼
        $(".prev").on("click", function(){
            index--
            if(index<0){
                index=sliders.length-1
            }
            moveSlide()
        })

        nemoes.on("click", function(){
            index=$(this).index()
            moveSlide()
        })
    </script>
</body>
</html>
