<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        //구구단 1단 출력
        /*for(let i=1;i<=9;i++){
            document.write("1x",i," = ",1*i, "<br>")
        }*/
        //구구단 1단부터 9단까지 전체 출력
        for(let i=2;i<=5;i++){
            document.write("***", i, "단***"+ "<br>")
            
            for(let j=1;j<=9;j++){
                document.write(i, "x",j," = ",i*j, "<br>")
                
            }
            document.write("-----------","<br>")
        }
    </script>

</body>
