<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        .wrap{
            width: min(1500px, 90%);
            margin: 30px auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        h2{
            font-size: clamp(25px, 4vw, 50px);
            text-align: center;
            margin-bottom: 20px;
            margin-top: 20px;
        }
        .grid{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px,1fr));
            gap: 20px;
        }
        .card{
            border: 1px solid #ccc;
            border-radius: 10px;
            height: clamp(500px, 10vw, 500px);
            object-fit: cover;
            transition: all 0.5s;
        }
        .card:hover{
            transform: scale(1.05);
        }
        .card img{
            width: 100%;
            height: 70%;
            border-radius: 10px;
            object-fit: cover;
        }
        .card h3{
            font-size: clamp(20px, 2vw, 30px);
            margin-top: 10px;
            padding-left: 10px;
        }
        .card p{
            font-size: clamp(14px, 1vw, 20px);
            margin-top: 7px;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <h2>작품 갤러리</h2>
    <div class="wrap" id="wrap"></div>

    <script>
        async function gallery(){
            try{
                let res=await fetch("data3.json")
                let data=await res.json()
                let wrap=document.querySelector("#wrap")
                let html=''

                data.forEach(function(item){
                    html+=`
                    <div class="grid">
                        <div class="card">
                            <img src="${item.image}" alt="${item.title}" />
                                <div class="textBox">
                                    <h3>${item.title}</h3>
                                    <p>${item.description}</p>
                                    <p>작가: ${item.artist}</p>
                                </div>
                            </div>
                        </div>
                        `
                })
                wrap.innerHTML=html
            }catch(err){
                console.error("에러발생", err)
            }
        }
        gallery()
    </script>
</body>
</html>
