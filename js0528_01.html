<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- promise 
        자바스크립트 같은 시간이 오래 걸리는 작업(파일 로딩, 타이머, 네트워크)은
        비동기 방식으로 처리(결과가 나중에 오기 때문)
        이 방식을 처리하는 도구의 대표 promise
        
        ** resolve(성공값), reject(실패값) **
        let pro=new Promise(function(resolve, reject){
            resolve("성공값 호호호호호")
        })

            프로미스가 작업을 성공했을 때, resolve 괄호 안에 있는 값을 가져간다.
            then: 만약 성공했다면 성공값(resolve)을 처리한다.

            pro.then(function(k){    -> 값을 받을 수 있는 k라는 변수 설정하기
                console.log("나는 then을 처리한다.", k)
            })

            작업이 실패할 시,
            pro.catch(function(k){
                console.log("나는 catch가 처리한다.", k)
            })

            finction(){}     ->        ()=>{}
        -->
     <script>
        let pro=new Promise((resolve, reject)=>{    //promise는 어떤 작업을 시켰을 때 성공인지 실패인지 가려내야 함.
            // 어떤 작업을 한다. (for, if ..)
            resolve("와우 성공이다!")   // 작업을 성공했을 때 보내는 값
            reject("아이고 실패했다.")  // 작업을 실패했을 때 보내는 값
        })

        pro.then((v)=>{               //성공값 가져오기
            document.write("나는 then이다. ", v, "<br>")
        })

        let bad=new Promise((_,reject)=>{  //실패하는 걸 보기 위해 강제로 reject만 적기로 할게?
            reject(new Error("에러 발생"))  //new Error는 강제로 에러 발생하게 하는 명령어
        })

        bad.catch((e)=>{   // catch는 실패값을 가지고 온다.
            document.write("여기는 catch 안이다. ", e)
        })
     </script>
</body>
</html>
