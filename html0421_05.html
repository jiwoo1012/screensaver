<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font face</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&family=Do+Hyeon&family=Jua&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'myfont';
            src: url('./font/Griun_PolSensibility-Rg.ttf');
            font-weight: 400;
        }
        @font-face {
            font-family: 'myfont2';
            src: url('./font/Mungyeong-Gamhong-Apple.ttf');
            font-weight: 400;
        }
        .Box{
                font-family: "myfont", sans-serif;
                font-weight: 400;
                font-size: 48px;
            }
        .name{
            font-family: "myfont2", sans-serif;
            font-size: 40px;
        }
    </style>
</head>
<body>
    <div class="Box">프론트엔드 개발자</div>
    <div class="name">김지우</div>
</body>
</html>
