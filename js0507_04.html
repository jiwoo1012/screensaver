<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이름과 패스워드를 받고, 패스워드가 1234이면 00 님 환영합니다. 그렇지 않으면 다시 입력해주세요 메시지 띄우기</title>
</head>
<body>
    <div class="contain">
        <input id="name" type="text" placeholder="이름을 입력하세요.">
        <input id="password" type="number" placeholder="비밀번호를 입력하세요.">
        <button onclick="hello()">로그인</button>
        <div class="dis"></div>
    </div>
    <script>
        function hello(){
            let name=document.querySelector('#name').value
            let password=Number(document.querySelector('#password').value)

            if(password===1234){
                document.querySelector('.dis').innerHTML=`${name} 님 환영합니다.`
            }else{
                document.querySelector('.dis').innerHTML=`비밀번호를 다시 입력해주세요.`
            }
        }
    </script>
</body>
</html>
