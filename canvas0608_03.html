        //원형 과제
        ctx.beginPath()

        cir.addColorStop(1,"green")
        ctx.shadowBlur=100
        ctx.shadowOffsetX=10
        ctx.shadowOffsetY=18
        ctx.shadowColor="skyblue"

        ctx.arc(100,100,100,0,Math.PI*2)
