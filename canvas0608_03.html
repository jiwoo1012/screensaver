<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <canvas width="500" height="400"></canvas>
    <script>
        let canvas=document.querySelector("canvas")
        let ctx=canvas.getContext("2d") 
        ctx.fillStyle="white"

        ctx.beginPath()
        ctx.strokeStyle="red"
        ctx.fillStyle="red"
        ctx.moveTo(300,100)
        ctx.lineTo(250,)
        ctx.lineTo(100,100)
        ctx.closePath()
        ctx.fill()
        ctx.stroke()
    </script>
</body>
</html>
